<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Readback</title>
<style>
  /* Fonts are bundled (latin subset, variable) so the panel loads with zero
     outbound requests and renders identically offline. See fonts/README.md. */
  @font-face {
    font-family: "Orbitron"; font-style: normal; font-weight: 400 900;
    font-display: swap; src: url("fonts/orbitron-latin.woff2") format("woff2");
  }
  @font-face {
    font-family: "Roboto"; font-style: normal; font-weight: 100 900;
    font-stretch: 100%; font-display: swap;
    src: url("fonts/roboto-latin.woff2") format("woff2");
  }
  :root {
    --txt: #eaf1fb; --muted: #c4d5ec; --dim: #9ab2d2;
    --blue: #3378f6; --blue-2: #60a5fa; --cyan: #22d3ee; --cyan-2: #67e8f9;
    --line: rgba(51,120,246,.85); --line-soft: rgba(51,120,246,.35);
    --good: #34d399; --warn: #fbbf24; --crit: #f87171;
    --hud: "Orbitron", "Segoe UI", system-ui, sans-serif;
    --body: "Roboto", "Segoe UI", system-ui, sans-serif;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 82% -8%, rgba(37,99,235,.10), transparent 55%),
      #000;
    color: var(--txt); font-family: var(--body);
    display: flex; align-items: flex-start; justify-content: center; padding: 28px 16px 48px;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(51,120,246,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(51,120,246,.05) 1px, transparent 1px);
    background-size: 46px 46px;
    -webkit-mask-image: linear-gradient(180deg, #000 0%, transparent 80%);
            mask-image: linear-gradient(180deg, #000 0%, transparent 80%);
    opacity: .5;
  }
  .wrap { width: 100%; max-width: 480px; position: relative; z-index: 1; }
  .card {
    background: linear-gradient(180deg, rgba(13,21,38,.9), rgba(7,12,24,.94));
    border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 0 0 1px rgba(51,120,246,.08), 0 8px 30px rgba(0,0,0,.6), inset 0 0 18px rgba(51,120,246,.05);
    padding: 20px 20px 18px;
  }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo-img { height: 42px; width: auto; display: block; filter: drop-shadow(0 0 7px rgba(51,120,246,.35)); }
  .head-right { display: flex; align-items: center; gap: 12px; }
  .spk { display: inline-flex; align-items: center; transition: color .15s ease, filter .15s ease; }
  .spk.on { color: var(--cyan-2); filter: drop-shadow(0 0 6px rgba(103,232,249,.5)); }
  .spk.off { color: var(--dim); }
  .spk svg { width: 22px; height: 22px; }
  .title { font-family: var(--body); font-size: 25px; line-height: 1; letter-spacing: -.3px; }
  .title .r { font-weight: 300; color: var(--txt); }
  .title .b { font-weight: 700; color: var(--blue-2); }
  .subtitle { font-family: var(--hud); font-size: 9.5px; color: var(--dim); letter-spacing: 2.4px; text-transform: uppercase; margin-top: 5px; }
  .toggle { --w: 64px; --h: 30px; width: var(--w); height: var(--h); border-radius: 6px; position: relative; border: 1px solid var(--line-soft); background: #04070e; cursor: pointer; flex: none; transition: all .15s ease; padding: 0; }
  .toggle .knob { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 4px; background: #3b4a63; transition: all .15s ease; }
  .toggle[aria-checked="true"] { background: rgba(51,120,246,.20); border-color: var(--blue); box-shadow: 0 0 14px rgba(51,120,246,.4), inset 0 0 8px rgba(51,120,246,.2); }
  .toggle[aria-checked="true"] .knob { left: calc(var(--w) - 25px); background: var(--cyan-2); box-shadow: 0 0 10px rgba(103,232,249,.8); }
  .rule { height: 1px; background: var(--line-soft); margin: 18px 0; }
  label.lbl { display: block; font-family: var(--hud); font-size: 10.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan-2); margin: 0 0 8px; font-weight: 700; }
  select, input[type="text"], input[type="password"] { width: 100%; height: 42px; padding: 0 12px; color: var(--txt); background: #04070e; border: 1px solid var(--line); border-radius: var(--radius); font-size: 14px; font-family: var(--body); outline: none; transition: border-color .15s, box-shadow .15s; }
  select:focus, input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(34,211,238,.14); }
  select { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%233378f6' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 34px; }
  .seg { display: flex; gap: 8px; margin-bottom: 4px; }
  .seg button { flex: 1; height: 40px; border-radius: 6px; border: 1px solid var(--line); background: #04070e; color: var(--dim); font-family: var(--hud); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .15s; }
  .seg button:hover { border-color: var(--cyan); color: var(--muted); }
  .seg button.active { border-color: var(--blue); color: var(--txt); background: rgba(51,120,246,.16); box-shadow: 0 0 12px rgba(51,120,246,.3); }
  .row { display: flex; gap: 8px; align-items: center; }
  .mb { margin-bottom: 18px; }
  button.icon, button.btn { height: 42px; border-radius: 6px; border: 1px solid var(--line); background: #04070e; color: var(--cyan-2); cursor: pointer; font-family: var(--hud); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; gap: 7px; transition: all .15s; }
  button.icon { width: 46px; flex: none; }
  button.btn { padding: 0 16px; }
  button.icon:hover, button.btn:hover { border-color: var(--cyan); box-shadow: 0 0 12px rgba(51,120,246,.3); }
  button:active { transform: scale(0.97); }
  button svg { width: 16px; height: 16px; }
  .slider { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .slider .lbl2 { width: 92px; font-family: var(--body); font-size: 12px; color: var(--muted); letter-spacing: .3px; }
  .slider output { min-width: 46px; text-align: right; font-family: var(--hud); font-size: 14px; font-weight: 700; color: var(--cyan-2); font-variant-numeric: tabular-nums; }
  input[type="range"] { -webkit-appearance: none; appearance: none; flex: 1; height: 3px; border-radius: 3px; background: rgba(51,120,246,.25); outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 4px; background: var(--blue); cursor: pointer; box-shadow: 0 0 10px rgba(51,120,246,.7); border: 1px solid var(--cyan); }
  input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 4px; background: var(--blue); cursor: pointer; border: 1px solid var(--cyan); box-shadow: 0 0 10px rgba(51,120,246,.7); }
  .hint { font-family: var(--body); font-size: 11.5px; color: var(--dim); margin: -6px 0 12px 106px; }
  .switch-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .switch-row .lbl2 { font-family: var(--body); font-size: 12px; color: var(--muted); letter-spacing: .3px; }
  .toggle.sm { --w: 48px; --h: 26px; }
  .toggle.sm .knob { width: 18px; height: 18px; }
  .toggle.sm[aria-checked="true"] .knob { left: calc(var(--w) - 21px); }
  .keyState { font-family: var(--body); font-size: 11.5px; color: var(--dim); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
  .keyState.ok { color: var(--good); }
  .foot { display: flex; align-items: center; gap: 8px; margin-top: 16px; font-family: var(--body); font-size: 11.5px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--dim); box-shadow: 0 0 8px currentColor; }
  .dot.on { background: var(--good); color: var(--good); }
  .dot.off { background: var(--dim); color: transparent; box-shadow: none; }
  .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px); background: linear-gradient(180deg, rgba(13,21,38,.96), rgba(7,12,24,.98)); border: 1px solid var(--line); color: var(--txt); padding: 10px 16px; border-radius: 8px; font-family: var(--body); font-size: 13px; opacity: 0; pointer-events: none; transition: all .25s ease; box-shadow: 0 10px 30px rgba(0,0,0,.6); max-width: 90vw; z-index: 3; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: var(--crit); color: #ffd7db; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="brand">
        <img class="logo-img" src="logo.png" alt="Readback" />
        <div>
          <div class="title"><span class="r">Read</span><span class="b">Back</span></div>
          <div class="subtitle">Claude Code voice</div>
        </div>
      </div>
      <div class="head-right">
        <span class="spk off" id="spk" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
        </span>
        <button id="toggle" class="toggle" role="switch" aria-checked="false" aria-label="Voice output on or off"><span class="knob"></span></button>
      </div>
    </div>

    <div class="rule"></div>

    <label class="lbl">Provider</label>
    <div class="seg" id="providerSeg"></div>

    <div class="rule"></div>

    <label class="lbl" for="voice">Voice</label>
    <div class="row mb">
      <select id="voice"><option>Loading…</option></select>
      <button id="preview" class="icon" aria-label="Preview voice" title="Preview"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
    </div>

    <label class="lbl" for="model">Model</label>
    <div class="mb"><select id="model"></select></div>

    <div id="tuning"></div>

    <div class="rule"></div>

    <div class="row">
      <input type="text" id="testText" placeholder="Speak a test line…" />
      <button id="speak" class="btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Speak</button>
      <button id="stop" class="icon" aria-label="Stop playback" title="Stop"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button>
    </div>

    <div class="rule"></div>

    <label class="lbl" id="keyLabel" for="apiKey">API key</label>
    <div class="row">
      <input type="password" id="apiKey" placeholder="Paste your key…" autocomplete="off" spellcheck="false" />
      <button id="saveKey" class="btn">Save</button>
    </div>
    <div class="keyState" id="keyState">checking…</div>

    <div class="foot">
      <span id="dot" class="dot off"></span>
      <span id="status">connecting…</span>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let state = {}, meta = {}, keys = {}, voiceList = [];
const prov = () => state.provider;
const cfg = () => state[state.provider] || {};

function toast(msg, isErr) {
  const t = $('toast');
  t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toast._t); toast._t = setTimeout(() => (t.className = 'toast'), 2600);
}
async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    let detail = '';
    try { const j = await res.json(); detail = j.error || j.reason || ''; } catch {}
    throw new Error(detail || ('HTTP ' + res.status));
  }
  return res.json();
}
function absorb(s) { meta = s.providers || meta; keys = s.keys || keys; delete s.providers; delete s.keys; state = s; }

async function patchTop(body) {
  try { absorb(await api('/api/state', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })); }
  catch (e) { toast('Could not save: ' + e.message, true); }
}
async function patchConfig(config) {
  try { absorb(await api('/api/state', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ config }) })); }
  catch (e) { toast('Could not save: ' + e.message, true); }
}

function renderProviders() {
  const seg = $('providerSeg'); seg.innerHTML = '';
  for (const [id, m] of Object.entries(meta)) {
    const b = document.createElement('button');
    b.textContent = m.label;
    if (id === prov()) b.classList.add('active');
    b.addEventListener('click', () => switchProvider(id));
    seg.appendChild(b);
  }
}
async function switchProvider(id) {
  if (id === prov()) return;
  await patchTop({ provider: id });
  await renderAll();
}
function renderModels() {
  const sel = $('model'); sel.innerHTML = '';
  const models = (meta[prov()] && meta[prov()].models) || [];
  const have = new Set();
  const add = (id, label) => { if (have.has(id)) return; have.add(id); const o = document.createElement('option'); o.value = id; o.textContent = label; if (id === cfg().modelId) o.selected = true; sel.appendChild(o); };
  if (cfg().modelId && !models.some((m) => m.id === cfg().modelId)) add(cfg().modelId, cfg().modelId);
  for (const m of models) add(m.id, m.label);
}
function renderTuning() {
  const box = $('tuning'); box.innerHTML = '';
  const knobs = (meta[prov()] && meta[prov()].knobs) || [];
  for (const k of knobs) {
    if (k.type === 'toggle') {
      const row = document.createElement('div'); row.className = 'switch-row';
      const label = document.createElement('span'); label.className = 'lbl2'; label.textContent = k.label;
      const on = !!cfg()[k.key];
      const btn = document.createElement('button'); btn.className = 'toggle sm'; btn.setAttribute('role', 'switch'); btn.setAttribute('aria-checked', on ? 'true' : 'false'); btn.innerHTML = '<span class="knob"></span>';
      btn.addEventListener('click', () => { const nv = btn.getAttribute('aria-checked') !== 'true'; btn.setAttribute('aria-checked', nv ? 'true' : 'false'); patchConfig({ [k.key]: nv }); });
      row.appendChild(label); row.appendChild(btn); box.appendChild(row);
      continue;
    }
    const row = document.createElement('div'); row.className = 'slider';
    const label = document.createElement('span'); label.className = 'lbl2'; label.textContent = k.label;
    const input = document.createElement('input'); input.type = 'range'; input.min = k.min; input.max = k.max; input.step = k.step;
    const val = cfg()[k.key] != null ? cfg()[k.key] : k.min; input.value = val;
    const out = document.createElement('output');
    const fmt = (v) => Number(v).toFixed(k.step < 1 ? (k.step < 0.1 ? 2 : 1) : 0) + (k.suffix || '');
    out.textContent = fmt(val);
    let timer;
    input.addEventListener('input', () => { out.textContent = fmt(input.value); clearTimeout(timer); timer = setTimeout(() => patchConfig({ [k.key]: Number(input.value) }), 250); });
    row.appendChild(label); row.appendChild(input); row.appendChild(out); box.appendChild(row);
    if (k.hint) { const h = document.createElement('div'); h.className = 'hint'; h.textContent = k.hint; box.appendChild(h); }
  }
}
function renderKey() {
  const m = meta[prov()] || {}; const k = keys[prov()] || {};
  $('keyLabel').textContent = (m.label || '') + ' API key';
  $('apiKey').value = '';
  const el = $('keyState');
  if (k.hasKey) { el.className = 'keyState ok'; el.textContent = 'key saved · ' + (k.hint || 'set'); }
  else { el.className = 'keyState'; el.textContent = 'no ' + (m.label || '') + ' key yet. Paste it above and hit Save'; }
}
function voiceName() {
  const v = voiceList.find((x) => x.voiceId === cfg().voiceId);
  const dn = v ? (v.displayName || v.voiceId) : cfg().voiceId;
  return dn ? String(dn).split(' - ')[0].trim() : '';
}
function renderStatus() {
  const on = !!state.enabled;
  $('toggle').setAttribute('aria-checked', on ? 'true' : 'false');
  $('spk').className = 'spk ' + (on ? 'on' : 'off');
  $('dot').className = 'dot ' + (on ? 'on' : 'off');
  $('status').textContent = (on ? 'voice on' : 'muted') + ' · ' + (meta[prov()] ? meta[prov()].label : prov()) + ' · ' + (voiceName() || 'no voice') + ' · localhost:' + location.port;
}
function fillVoices(voices) {
  voiceList = voices || [];
  const sel = $('voice'); sel.innerHTML = '';
  const have = new Set();
  const add = (id, label) => { if (!id || have.has(id)) return; have.add(id); const o = document.createElement('option'); o.value = id; o.textContent = label; if (id === cfg().voiceId) o.selected = true; sel.appendChild(o); };
  for (const v of voices) {
    const name = v.displayName || v.voiceId;
    const desc = v.description ? ' - ' + v.description : '';
    add(v.voiceId, name + desc + (v.gender ? ' (' + v.gender + ')' : ''));
  }
  if (cfg().voiceId && !have.has(cfg().voiceId)) add(cfg().voiceId, cfg().voiceId + ' (current)');
  if (!sel.options.length) sel.innerHTML = '<option value="">(add a key to load voices)</option>';
}
async function loadVoices() {
  if (!(keys[prov()] && keys[prov()].hasKey)) { fillVoices([]); renderStatus(); return; }
  try { const { voices } = await api('/api/voices'); fillVoices(voices || []); }
  catch (e) { fillVoices([]); toast('Could not load voices: ' + e.message, true); }
  renderStatus();
}
// Everything redrawable from state alone. Deliberately excludes loadVoices():
// that one calls the provider API, so it must not run on every refresh.
function renderLocal() {
  renderProviders(); renderModels(); renderTuning(); renderKey(); renderStatus();
}
async function renderAll() {
  renderLocal();
  await loadVoices();
}

// The panel used to read state once at load and never again, so anything that
// changed voice elsewhere (the MCP tools, a dashboard button, a second tab) left
// this page showing a stale toggle: it would say ON while voice was actually
// off. Re-read whenever the tab is looked at, so the toggle can't lie.
async function refreshState() {
  try {
    absorb(await api('/api/state'));
    renderLocal();
  } catch {
    // server gone; keep the last known UI rather than blanking it
  }
}

async function saveKey() {
  const key = $('apiKey').value.trim();
  if (!key) { toast('Paste a key first', true); return; }
  try {
    const r = await api('/api/key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ provider: prov(), apiKey: key }) });
    $('apiKey').value = '';
    keys[prov()] = { hasKey: r.hasKey, hint: r.keyHint };
    renderKey(); toast('Key saved');
    await loadVoices();
  } catch (e) { toast('Could not save key: ' + e.message, true); }
}
async function say(text) {
  try { const r = await api('/api/say', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    // Preview deliberately works while muted, which is confusing on its own: a
    // successful test says nothing about whether replies will actually speak.
    // Say so, rather than letting it read as "everything is fine".
    if (r.ok) toast(state.enabled ? 'Speaking…' : 'Speaking (auto-speak is OFF)');
    else toast('Nothing to speak', true);
  } catch (e) { toast('Speak failed: ' + e.message, true); }
}

$('toggle').addEventListener('click', async () => {
  state.enabled = !state.enabled; renderStatus();   // optimistic: the click feels instant
  await patchTop({ enabled: state.enabled });        // then reconcile with the server's answer
  renderStatus();
});
$('voice').addEventListener('change', (e) => { patchConfig({ voiceId: e.target.value }); state[prov()].voiceId = e.target.value; renderStatus(); });
$('model').addEventListener('change', (e) => { patchConfig({ modelId: e.target.value }); });
$('preview').addEventListener('click', () => { const n = voiceName(); say(n ? ('Hi, this is ' + n + '. This is how I sound at these settings.') : 'This is how the selected voice sounds at these settings.'); });
$('speak').addEventListener('click', () => { const t = $('testText').value.trim(); say(t || 'Readback is online and ready.'); });
$('testText').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('speak').click(); });
$('stop').addEventListener('click', async () => { try { await api('/api/stop', { method: 'POST' }); toast('Stopped'); } catch (e) {} });
$('saveKey').addEventListener('click', saveKey);
$('apiKey').addEventListener('keydown', (e) => { if (e.key === 'Enter') saveKey(); });
window.addEventListener('focus', refreshState);
document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshState(); });

// Poll lightly so the toggle stays truthful even on a screen that never loses
// focus (an always-open dashboard). Only the status line + toggle are redrawn,
// never the dropdowns, so it can't disturb a selection in progress. This is what
// stops the panel from ever displaying "on" while voice is actually off.
setInterval(async () => {
  try { absorb(await api('/api/state')); renderStatus(); } catch {}
}, 3000);

(async function init() {
  try { const s = await api('/api/state'); absorb(s); }
  catch (e) { $('status').textContent = 'panel offline'; toast('Cannot reach the Readback server', true); return; }
  await renderAll();
})();
</script>
</body>
</html>
